name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test
        run: go test ./... -race -count=1
      - name: Build
        run: |
          go build -o /dev/null ./cmd/pace
          go build -o /dev/null ./cmd/paced
